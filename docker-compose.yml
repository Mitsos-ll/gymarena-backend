version: '3.9'

services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - gymtrack_data:/app/data
    env_file:
      - .env
    environment:
      - ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/gymtrack.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gymtrack_data:
    driver: local
