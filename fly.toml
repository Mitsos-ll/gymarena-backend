# fly.toml — GymTrack Backend
app = "gymtrack-backend"
primary_region = "cdg"  # Paris

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  PORT = "3000"
  DATABASE_PATH = "/app/data/gymtrack.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "gymtrack_data"
  destination = "/app/data"
