name: gymtrack_backend
version: 0.3.0

description: GymTrack backend — production-ready Dart/Shelf server.

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  args: ^2.6.0
  bcrypt: ^1.1.3          # Remplace SHA-256 pour les mots de passe
  crypto: ^3.0.5          # Toujours utilisé pour les tokens
  http: ^1.3.0
  logging: ^1.3.0         # Logs structurés
  path: ^1.9.1
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  sqlite3: ^2.7.5
  uuid: ^4.5.1

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
